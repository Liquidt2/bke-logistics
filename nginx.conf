server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml
        application/json
        image/svg+xml;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # OpenClaw webhook proxy — hits OpenClaw container directly (port 18789)
    # Bypasses Nginx Proxy Manager so requests don't get routed to Salty-OS
    location /api/webhook {
        proxy_pass http://172.17.0.1:18789/hooks/agent;
        proxy_set_header Host 172.17.0.1;
        proxy_set_header Authorization "Bearer b31f59bd31db58608bdc6c8418b94edca02eb20af25c526ed4b1a8935f5d9c5f";
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers off;
    }

    # Handle Astro static routes
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
