version: '3.8'

services:
  bke-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bke-logistics-web
    ports:
      - "80:80"
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.bke.service=web"
      - "com.bke.env=production"

# Notes:
# - Nginx Proxy Manager should proxy bkelogistics.com → http://[vps-ip]:80
# - SSL/TLS is handled by Nginx Proxy Manager (Let's Encrypt)
# - If you need a different host port (e.g., 3000), change "80:80" to "3000:80"
